<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>突變危機：皮皮生存戰 - 微觀基因模擬系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; } 
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CARD_DECK = [
          ...Array(16).fill({ id: 'safe', type: 'natural', name: '平靜的歲月', desc: '平安過了一年，抄寫無誤，沒有突變。', target: 'none' }),
          { id: 'n1', type: 'natural', name: '罕見自然突變', desc: '體細胞突變！將體細胞中的一個 A 突變。', target: 'somatic', from: 'A', to: 'A_mut' },
          { id: 'n2', type: 'natural', name: '罕見自然突變', desc: '體細胞突變！將體細胞中的一個 a 突變。', target: 'somatic', from: 'a', to: 'a_mut' },
          { id: 'n3', type: 'natural', name: '罕見自然突變', desc: '生殖細胞突變！將生殖細胞中的一個 A 突變。', target: 'germ', from: 'A', to: 'A_mut' },
          { id: 'n4', type: 'natural', name: '罕見自然突變', desc: '生殖細胞突變！將生殖細胞中的一個 A 突變。', target: 'germ', from: 'A', to: 'A_mut' }, 
          { id: 'e1', type: 'env', name: 'X光異常照射', desc: '輻射穿透！生殖細胞的一個 A 變成突變型。', target: 'germ', from: 'A', to: 'A_mut' },
          { id: 'e2', type: 'env', name: 'X光異常照射', desc: '輻射穿透！生殖細胞的一個 A 變成突變型。', target: 'germ', from: 'A', to: 'A_mut' }, 
          { id: 'e3', type: 'env', name: '紫外線直射', desc: '臭氧層破洞！體細胞 (皮膚) 的一個 A 變成突變型。', target: 'somatic', from: 'A', to: 'A_mut' },
          { id: 'e4', type: 'env', name: '紫外線直射', desc: '臭氧層破洞！體細胞 (皮膚) 的一個 A 變成突變型。', target: 'somatic', from: 'A', to: 'A_mut' }, 
          { id: 'e5', type: 'env', name: '核輻射外洩', desc: '暴露於高能輻射！生殖細胞的一個 A 變成突變型。', target: 'germ', from: 'A', to: 'A_mut' },
          { id: 'e6', type: 'env', name: '核輻射外洩', desc: '暴露於高能輻射！生殖細胞的一個 a 變成突變型。', target: 'germ', from: 'a', to: 'a_mut' },
          { id: 'e7', type: 'env', name: '亞硝酸鹽中毒', desc: '吃到劇毒蟲子！體細胞 (腸胃) 的一個 a 變成突變型。', target: 'somatic', from: 'a', to: 'a_mut' },
          { id: 'e8', type: 'env', name: '亞硝酸鹽中毒', desc: '吃到劇毒蟲子！體細胞 (腸胃) 的一個 A 變成突變型。', target: 'somatic', from: 'A', to: 'A_mut' }, // ← 就是這行剛剛漏了引號！
          { id: 'e9', type: 'env', name: '未知病毒感染', desc: '病毒嵌入DNA！生殖細胞的一個 A 變成突變型。', target: 'germ', from: 'A', to: 'A_mut' },
          { id: 'e10', type: 'env', name: '未知病毒感染', desc: '病毒嵌入DNA！體細胞的一個 a 變成突變型。', target: 'somatic', from: 'a', to: 'a_mut' }
        ];

        const MAX_ROUNDS = 6;

        const PHENOTYPE_OPTIONS = [
          { name: '冰皮皮', desc: '(顯性遺傳疾病)', examples: 'A*A, A*a, A*A*, A*a*' },
          { name: '岩皮皮', desc: '(隱性遺傳疾病)', examples: 'a*a*' },
          { name: '紫皮皮', desc: '(正常隱性)', examples: 'aa, a*a (帶因者)' },
          { name: '粉皮皮', desc: '(正常顯性)', examples: 'AA, Aa' }
        ];

        const getPhenotype = (alleles) => {
          if (alleles.includes('A_mut')) return { name: '冰皮皮', detail: '顯性突變疾病 (冰冷外觀在某些環境下不適應)', bgColor: 'bg-cyan-100', textColor: 'text-cyan-950', score: -10, scoreText: '- 10 分' };
          if (alleles.filter(a => a === 'a_mut').length === 2) return { name: '岩皮皮', detail: '隱性突變發病 (堅硬如岩石的保護色)', bgColor: 'bg-neutral-600', textColor: 'text-white', score: 20, scoreText: '+ 20 分' };
          if (alleles.includes('a') && alleles.includes('a_mut')) return { name: '紫皮皮', detail: '帶有隱性突變基因但不發病', bgColor: 'bg-purple-100', textColor: 'text-purple-950', score: 10, scoreText: '+ 10 分' };
          if (alleles.filter(a => a === 'a').length === 2) return { name: '紫皮皮', detail: '正常狀態', bgColor: 'bg-purple-100', textColor: 'text-purple-950', score: 10, scoreText: '+ 10 分' };
          return { name: '粉皮皮', detail: '正常狀態', bgColor: 'bg-pink-100', textColor: 'text-pink-950', score: 10, scoreText: '+ 10 分' };
        };

        const sortAlleles = (arr) => {
          const order = { 'A': 1, 'A_mut': 2, 'a': 3, 'a_mut': 4 };
          return [...arr].sort((x, y) => order[x] - order[y]);
        };

        const AlleleUI = ({ allele }) => {
          if (!allele) return <span className="font-bold">?</span>;
          if (allele === 'A_mut') return <span className="text-red-600 font-black">A*</span>;
          if (allele === 'a_mut') return <span className="text-red-600 font-black">a*</span>;
          return <span className="font-bold">{allele}</span>;
        };

        function App() {
          const [gameState, setGameState] = useState('SETUP'); 
          const [introStep, setIntroStep] = useState(1); 
          const [round, setRound] = useState(1);
          const [score, setScore] = useState(0);
          
          const [errorCount, setErrorCount] = useState(0);
          const [showRulesModal, setShowRulesModal] = useState(false);
          const [showNextGenAnim, setShowNextGenAnim] = useState(false);
          
          const [somaticStart, setSomaticStart] = useState([]);
          const [germStart, setGermStart] = useState([]);
          
          const [somatic, setSomatic] = useState([]);
          const [germ, setGerm] = useState([]);
          
          const [currentCard, setCurrentCard] = useState(null);
          const [mutationLog, setMutationLog] = useState('');
          const [roundEventLog, setRoundEventLog] = useState(''); 
          
          const [isPhenotypeConfirmed, setIsPhenotypeConfirmed] = useState(false);
          const [phenotypeError, setPhenotypeError] = useState('');

          const [expectedSomatic, setExpectedSomatic] = useState([]);
          const [expectedGerm, setExpectedGerm] = useState([]);
          const [pendingSomatic, setPendingSomatic] = useState([]);
          const [pendingGerm, setPendingGerm] = useState([]);
          const [mutationCheckMsg, setMutationCheckMsg] = useState('');

          const [reproPhase, setReproPhase] = useState('CHOOSE_CELL'); 
          const [cellChoiceError, setCellChoiceError] = useState('');
          const [hiddenGametes, setHiddenGametes] = useState([]);
          const [selectedKeepIndex, setSelectedKeepIndex] = useState(null);
          const [selectedPassIndex, setSelectedPassIndex] = useState(null);
          
          const [pendingReceivedGamete, setPendingReceivedGamete] = useState(null);
          
          const [myGamete, setMyGamete] = useState(null);
          const [passedGamete, setPassedGamete] = useState(null);
          
          const [history, setHistory] = useState([]);

          const handleJudgePhenotype = (chosenName) => {
            const currentPt = getPhenotype(somatic);
            if (chosenName === currentPt.name) {
              setIsPhenotypeConfirmed(true);
              setPhenotypeError('');
            } else {
              setPhenotypeError('❌ 錯誤！仔細看你的細胞，有顯性遺傳疾病(A*)嗎？還是隱性疾病(a*)成對發病了呢？');
              setErrorCount(prev => prev + 1); 
            }
          };

          const startGame = () => {
            const initialGenotypes = [['A', 'A'], ['A', 'a'], ['a', 'a']];
            const startingGenotype = initialGenotypes[Math.floor(Math.random() * initialGenotypes.length)];
            
            setSomaticStart(startingGenotype);
            setGermStart(startingGenotype);
            setSomatic(startingGenotype);
            setGerm(startingGenotype);
            
            setRound(1);
            setScore(0);
            setErrorCount(0); 
            setHistory([]);
            setRoundEventLog('-');
            setIsPhenotypeConfirmed(false); 
            setPendingReceivedGamete(null);
            setGameState('EVENT_DRAW');
            setCurrentCard(null);
          };

          const drawCard = () => {
            const card = CARD_DECK[Math.floor(Math.random() * CARD_DECK.length)];
            setCurrentCard(card);
            
            let newSomatic = [...somatic];
            let newGerm = [...germ];

            if (card.target === 'somatic') {
              const idx = newSomatic.indexOf(card.from);
              if (idx !== -1) newSomatic[idx] = card.to;
            } else if (card.target === 'germ') {
              const idx = newGerm.indexOf(card.from);
              if (idx !== -1) newGerm[idx] = card.to;
            }

            setExpectedSomatic(sortAlleles(newSomatic));
            setExpectedGerm(sortAlleles(newGerm));
            
            setPendingSomatic([...somatic]); 
            setPendingGerm([...germ]);
            setMutationCheckMsg('');
            setGameState('EVENT_APPLY');
          };

          const handleToggleMutation = (type, index) => {
            if (type === 'somatic') {
              const newArr = [...pendingSomatic];
              newArr[index] = newArr[index].includes('_mut') ? newArr[index].replace('_mut', '') : newArr[index] + '_mut';
              setPendingSomatic(newArr);
            } else {
              const newArr = [...pendingGerm];
              newArr[index] = newArr[index].includes('_mut') ? newArr[index].replace('_mut', '') : newArr[index] + '_mut';
              setPendingGerm(newArr);
            }
          };

          const checkMutation = () => {
            const isSomaticCorrect = JSON.stringify(sortAlleles(pendingSomatic)) === JSON.stringify(expectedSomatic);
            const isGermCorrect = JSON.stringify(sortAlleles(pendingGerm)) === JSON.stringify(expectedGerm);

            if (isSomaticCorrect && isGermCorrect) {
              setSomatic(expectedSomatic);
              setGerm(expectedGerm);
              
              let logMsg = "安全過關，沒有發生突變。";
              let historyDetail = "無發生突變"; 
              let didMutate = false;
              
              if (currentCard.target === 'somatic' && somatic.indexOf(currentCard.from) !== -1) {
                logMsg = `發生了！體細胞中的 ${currentCard.from} 突變了。`;
                historyDetail = `體細胞 ${currentCard.from} 突變`;
                didMutate = true;
              } else if (currentCard.target === 'germ' && germ.indexOf(currentCard.from) !== -1) {
                logMsg = `發生了！生殖細胞中的 ${currentCard.from} 突變了。`;
                historyDetail = `生殖細胞 ${currentCard.from} 突變`;
                didMutate = true;
              } else if (currentCard.target !== 'none') {
                logMsg = `幸運逃過一劫！你身上沒有對應的基因，所以沒受影響。`;
              }
              
              setMutationLog(logMsg);
              
              let causeStr = currentCard.type === 'natural' ? '[自然突變]' : '[外在導致突變]';
              if (!didMutate) {
                  causeStr = '[無突變]';
              }
              setRoundEventLog(`${currentCard.name}\n${causeStr}: ${historyDetail}`);
              
              if (!didMutate) {
                  setIsPhenotypeConfirmed(true);
              } else {
                  setIsPhenotypeConfirmed(false); 
              }
              
              setReproPhase('CHOOSE_CELL');
              setCellChoiceError('');
              setGameState('REPRODUCTION');
            } else {
              setMutationCheckMsg("❌ 調整錯誤！請仔細看事件卡：突變是發生在『體細胞』還是『生殖細胞』？是哪個字母變了？");
              setErrorCount(prev => prev + 1); 
            }
          };

          const handleChooseCellForMeiosis = (cellType) => {
            if (cellType === 'somatic') {
              setCellChoiceError('❌ 錯誤！體細胞不會產生配子！請選擇負責繁衍的「生殖細胞」。');
              setErrorCount(prev => prev + 1); 
            } else if (cellType === 'germ') {
              prepareReproduction();
            }
          };

          const prepareReproduction = () => {
            if (!expectedGerm || expectedGerm.length < 2) return;
            let gametes = [expectedGerm[0], expectedGerm[0], expectedGerm[1], expectedGerm[1]];
            for (let i = gametes.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [gametes[i], gametes[j]] = [gametes[j], gametes[i]];
            }
            
            setHiddenGametes(gametes);
            setSelectedKeepIndex(null);
            setSelectedPassIndex(null);
            setMyGamete(null);
            setPassedGamete(null);
            setPendingReceivedGamete(null);
            setReproPhase('PICK_GAMETES');
          };

          const handlePickGamete = (idx) => {
            if (selectedKeepIndex === idx || selectedPassIndex === idx) return; 
            
            if (selectedKeepIndex === null) {
              setSelectedKeepIndex(idx);
              setMyGamete(hiddenGametes[idx]);
            } else if (selectedPassIndex === null) {
              setSelectedPassIndex(idx);
              setPassedGamete(hiddenGametes[idx]);
            }
          };

          const receiveGamete = () => {
            if (!pendingReceivedGamete) return;
            
            setShowNextGenAnim(true);
            
            setTimeout(() => {
                const received = pendingReceivedGamete;
                const nextGenotype = sortAlleles([myGamete, received]);
                const currentPt = getPhenotype(somatic);
                const nextPt = getPhenotype(nextGenotype);
                
                const record = {
                  round: round,
                  somaticBefore: somaticStart,
                  germBefore: germStart,
                  phenotypeBefore: currentPt.name,
                  eventDetail: roundEventLog, 
                  somaticAfter: somatic, 
                  germAfter: germ,       
                  meiosisSource: '生殖細胞',
                  passed: passedGamete,
                  received: received,
                  nextGenotype: nextGenotype,
                  nextPhenotype: nextPt.name
                };
                
                setHistory([...history, record]);
                setScore(score + currentPt.score);

                setSomaticStart([...nextGenotype]);
                setGermStart([...nextGenotype]);
                setSomatic([...nextGenotype]);
                setGerm([...nextGenotype]);
                
                if (round >= MAX_ROUNDS) {
                  setGameState('END');
                  setIsPhenotypeConfirmed(true); 
                } else {
                  setRound(round + 1);
                  setCurrentCard(null);
                  setRoundEventLog('-');
                  setIsPhenotypeConfirmed(false); 
                  setPendingReceivedGamete(null);
                  setGameState('EVENT_DRAW');
                }
                
                setShowNextGenAnim(false); 
            }, 1500); 
          };

          const pt = getPhenotype(somatic);

          return (
            <div className="min-h-screen bg-slate-100 font-sans p-2 md:p-6 lg:p-8 flex flex-col items-center hide-scrollbar">
              
              {showNextGenAnim && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
                   <div className="bg-white px-8 py-10 md:px-12 md:py-12 rounded-3xl flex flex-col items-center animate-bounce shadow-2xl mx-4 border border-slate-200">
                      <span className="text-7xl md:text-8xl mb-4">🧬</span>
                      <h2 className="text-3xl md:text-5xl font-black text-indigo-700 text-center">繁衍成功！</h2>
                      <p className="text-lg md:text-2xl text-slate-600 font-bold mt-4 text-center">帶著突變與傳承，進入下一代...</p>
                   </div>
                </div>
              )}

              {showRulesModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                   <div className="bg-white p-6 md:p-8 rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto relative hide-scrollbar border border-slate-200 animate-fade-in">
                      <button onClick={() => setShowRulesModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-700 active:bg-slate-200 text-2xl font-black bg-slate-100 w-10 h-10 rounded-full flex items-center justify-center transition-colors">✕</button>
                      <h3 className="font-black text-2xl mb-4 text-indigo-800 border-b-2 border-indigo-100 pb-2 flex items-center gap-2">
                        📖 遊戲規則與表徵對照表
                      </h3>
                      <div className="mb-6 bg-blue-50 p-4 rounded-xl border border-blue-200 text-slate-700 text-sm md:text-base">
                        <p className="font-bold text-blue-800 mb-2">📌 遊戲流程：</p>
                        <ol className="list-decimal pl-5 space-y-2">
                          <li>每回合會抽取一張「事件卡」，可能引發自然或外在突變。</li>
                          <li>若卡片指示的基因你身上沒有，<span className="font-bold text-green-600">那就幸運逃過一劫，不用改變！</span></li>
                          <li>根據突變後的「體細胞」重新判定目前的表徵與加分。</li>
                          <li>使用「生殖細胞」進行減數分裂，保留一顆配子給自己，另一顆傳給右邊同學。</li>
                          <li>結合自己與左邊同學傳來的配子，誕生下一代！</li>
                        </ol>
                      </div>
                      <p className="text-sm md:text-base text-slate-600 mb-4 font-bold bg-yellow-50 p-3 rounded-lg border border-yellow-200">
                        ⚠️ 表徵判定：A* 和 a* 代表突變基因。隱性突變 (a*) 必須湊齊一對 (a*a*) 才會發病喔！
                      </p>
                      <ul className="space-y-3 text-slate-700">
                          {PHENOTYPE_OPTIONS.map(opt => (
                              <li key={opt.name} className="flex flex-col md:flex-row md:items-center gap-2 md:gap-3 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                  <div className="font-black text-lg md:text-xl text-slate-800 flex items-baseline gap-2">
                                    {opt.name} <span className="text-sm font-bold text-indigo-600">{opt.desc}</span>
                                  </div>
                                  <div className="md:ml-auto text-sm text-slate-500 font-bold">包含基因型：</div>
                                  <div className="font-mono text-base md:text-lg bg-indigo-100 text-indigo-900 px-3 py-1 rounded shadow-inner text-center">
                                    {opt.examples}
                                  </div>
                              </li>
                          ))}
                      </ul>
                   </div>
                </div>
              )}

              <div className="max-w-5xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                
                <div className="bg-slate-800 text-white p-5 md:p-6 flex flex-col md:flex-row justify-between items-center relative gap-4 md:gap-0 border-b border-slate-700">
                  <div className="text-center md:text-left">
                    <h1 className="text-2xl md:text-3xl font-black tracking-wider flex items-center justify-center md:justify-start gap-3 active:scale-95 transition-transform">
                      Mutation Crisis
                      {gameState !== 'SETUP' && (
                        <button onClick={() => setShowRulesModal(true)} className="text-sm bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 active:scale-95 text-white px-3 py-1.5 rounded-full font-bold shadow-md transition-all flex items-center gap-1">
                          <span>📖</span> 規則
                        </button>
                      )}
                    </h1>
                    <p className="text-slate-300 mt-1 text-sm md:text-base">突變危機：皮皮生存戰 - 微觀基因模擬系統</p>
                  </div>
                  <div className="text-center md:text-right w-full md:w-auto">
                    <div className="text-lg flex items-baseline justify-center md:justify-end gap-2">目前回合：<span className="text-3xl font-bold text-teal-400">{round}</span> <span className="text-sm">/ {MAX_ROUNDS}</span></div>
                    {gameState !== 'SETUP' && (
                      <div className="flex justify-center md:justify-end gap-4 mt-2 text-sm bg-slate-700 px-4 py-2 rounded-xl border border-slate-600 shadow-inner">
                        <div className="text-slate-300">生存分: <span className="text-teal-300 font-bold text-lg">{score}</span></div>
                        <div className="text-slate-300">錯誤扣分: <span className="text-red-400 font-bold text-lg">-{errorCount * 5}</span></div>
                      </div>
                    )}
                  </div>
                </div>

                {gameState === 'SETUP' && introStep === 1 && (
                  <div className="p-6 md:p-16 text-center bg-slate-50 animate-fade-in hide-scrollbar overflow-y-auto max-h-[85vh]">
                    <div className="text-7xl mb-6 animate-bounce active:scale-110 transition-transform">🧬</div>
                    <h2 className="text-3xl md:text-5xl font-black mb-8 text-slate-800 tracking-wider animate-fade-in">歡迎來到突變危機</h2>
                    
                    <div className="max-w-3xl mx-auto bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200 text-left mb-10 text-base md:text-lg text-slate-700 leading-relaxed border border-slate-200">
                        <p className="mb-4">歡迎來到皮皮的棲息地！這裡的環境充滿了引發<span className="font-bold text-indigo-700">基因突變</span>的未爆彈。</p>
                        <p className="mb-4">有時強烈的紫外線會破壞皮膚細胞，有時會誤食含有化學毒素的蟲子，甚至可能遭遇游離輻射的異常照射！</p>
                        <p className="mb-4">身為一隻皮皮，你的 DNA 隨時面臨著改變的風險。當突變發生時，你必須敏銳地判斷：</p>
                        <p className="mb-4">這個突變是打中你的<span className="font-bold text-blue-600">「體細胞」</span>（改變你現在的外貌），還是打中你的<span className="font-bold text-green-600">「生殖細胞」</span>（偷偷潛伏，準備遺傳給下一代）？</p>
                        <p className="font-bold text-slate-800 bg-indigo-50 p-5 rounded-xl border-l-4 border-indigo-500 mt-6 shadow-inner border border-indigo-100">
                            💡 準備好迎接突變的考驗了嗎？運用你的遺傳學知識，幫助皮皮家族在危機中繁衍下去吧！
                        </p>
                    </div>

                    <button onClick={() => setIntroStep(2)} className="bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 active:scale-95 text-white font-black py-4 md:py-5 px-10 md:px-14 rounded-full text-xl md:text-2xl shadow-xl transition-all w-full md:w-auto">
                      查看生存守則 ➡️
                    </button>
                  </div>
                )}

                {gameState === 'SETUP' && introStep === 2 && (
                  <div className="p-6 md:p-12 text-center bg-slate-50 animate-fade-in hide-scrollbar overflow-y-auto max-h-[85vh]">
                    <h2 className="text-3xl md:text-4xl font-black mb-8 text-slate-800">遊戲規則與準備</h2>
                    
                    <div className="text-left bg-white p-6 md:p-10 rounded-3xl mb-10 shadow-sm border border-slate-200 max-w-3xl mx-auto border border-slate-200">
                      <h3 className="font-black text-xl md:text-2xl mb-6 text-indigo-800 border-b-2 border-indigo-100 pb-3 flex items-center gap-2">
                        📖 遊戲規則與表徵對照表
                      </h3>
                      
                      <div className="mb-6 bg-blue-50 p-5 rounded-xl border border-blue-200 text-slate-700 text-base shadow-inner border border-blue-100">
                        <p className="font-bold text-blue-800 mb-3 text-lg">📌 遊戲流程：</p>
                        <ol className="list-decimal pl-6 space-y-2">
                          <li>每回合會抽取一張「事件卡」，可能引發自然或外在突變。</li>
                          <li>若卡片指示的基因你身上沒有，<span className="font-bold text-green-600">那就幸運逃過一劫，不用改變！</span></li>
                          <li>根據突變後的「體細胞」重新判定目前的表徵與生存加分。</li>
                          <li>使用「生殖細胞」進行減數分裂，保留一顆配子給自己，另一顆傳給右邊同學。</li>
                          <li>結合自己與左邊同學傳來的配子，誕生下一代！</li>
                        </ol>
                      </div>

                      <p className="text-base text-slate-600 mb-4 font-bold bg-yellow-50 p-3 rounded-lg border border-yellow-200 border border-yellow-100">
                        ⚠️ 表徵判定規則：A* 和 a* 代表突變基因。隱性突變 (a*) 必須湊齊一對 (a*a*) 才會發病表現出來喔！
                      </p>
                      <ul className="space-y-3 text-slate-700">
                          {PHENOTYPE_OPTIONS.map(opt => (
                              <li key={opt.name} className="flex flex-col md:flex-row md:items-center gap-2 md:gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100 border border-slate-100 active:scale-95 transition-transform">
                                  <div className="font-black text-lg md:text-xl text-slate-800 flex items-baseline gap-2">
                                    {opt.name} <span className="text-sm font-bold text-indigo-600">{opt.desc}</span>
                                  </div>
                                  <div className="md:ml-auto text-sm text-slate-500 font-bold">包含基因型：</div>
                                  <div className="font-mono text-base md:text-lg bg-indigo-100 text-indigo-900 px-4 py-1.5 rounded shadow-inner text-center border border-indigo-200">
                                    {opt.examples}
                                  </div>
                              </li>
                          ))}
                      </ul>
                    </div>

                    <div className="flex flex-col md:flex-row justify-center gap-4">
                        <button onClick={() => setIntroStep(1)} className="bg-slate-300 hover:bg-slate-400 active:bg-slate-400 active:scale-95 text-slate-700 font-bold py-4 px-10 rounded-full text-xl shadow transition-all w-full md:w-auto">
                            ⬅️ 回上一頁
                        </button>
                        <button onClick={startGame} className="bg-teal-600 hover:bg-teal-500 active:bg-teal-700 active:scale-95 text-white font-black py-4 px-12 rounded-full text-xl md:text-2xl shadow-xl transition-all w-full md:w-auto">
                            開始突變挑戰 🧬
                        </button>
                    </div>
                  </div>
                )}

                {gameState !== 'SETUP' && gameState !== 'END' && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-0 border-b border-slate-200 hide-scrollbar overflow-y-auto max-h-[85vh]">
                    
                    <div className="p-6 md:p-8 bg-slate-50 border-r border-slate-200">
                      <h3 className="text-xl font-bold text-slate-700 mb-6 border-b-2 border-slate-200 pb-3 flex items-center">
                        🐦 你的皮皮狀態 <span className="ml-auto text-sm bg-slate-800 text-white px-4 py-1.5 rounded-full">-- 第 {round} 代</span>
                      </h3>
                      
                      {!isPhenotypeConfirmed ? (
                        <div className="mb-8 flex flex-col items-center animate-fade-in">
                          <div className="text-lg font-bold text-slate-700 mb-4 text-center">🤔 判斷考驗：根據你的基因組合，你的表徵是？</div>
                          <div className="grid grid-cols-2 gap-4 w-full">
                             {PHENOTYPE_OPTIONS.map(opt => (
                               <button key={opt.name} onClick={() => handleJudgePhenotype(opt.name)} className="py-4 px-2 bg-white rounded-2xl border-2 border-slate-300 hover:border-indigo-500 hover:bg-indigo-50 active:bg-indigo-100 active:scale-95 active:border-indigo-600 shadow-sm transition-all flex flex-col items-center justify-center border border-slate-200">
                                 <span className="font-black text-slate-700 text-xl">{opt.name}</span>
                                 <span className="text-sm text-indigo-600 font-bold mt-2">{opt.desc}</span>
                               </button>
                             ))}
                          </div>
                          {phenotypeError && <div className="text-lg text-red-600 mt-5 font-black text-center bg-red-100 p-4 rounded-xl w-full shadow-inner border border-red-200 animate-pulse">{phenotypeError}</div>}
                        </div>
                      ) : (
                        <div className={`p-8 rounded-3xl mb-8 shadow-inner flex flex-col items-center justify-center relative ${pt.bgColor} ${pt.textColor} border-2 border-slate-200 transition-colors duration-500 animate-fade-in border border-slate-200`}>
                          <div className="text-3xl font-black mb-2">{pt.name}</div>
                          <div className="text-base opacity-90">{pt.detail}</div>
                          <div className="mt-4 px-5 py-2 bg-white/30 backdrop-blur-md rounded-full font-black shadow-sm text-lg border border-white/40">
                            本代可獲加分: {pt.scoreText}
                          </div>
                        </div>
                      )}

                      <div className="grid grid-cols-2 gap-4 md:gap-6">
                        <div className={`bg-blue-50 border-2 border-blue-300 rounded-2xl p-5 text-center relative transition-all duration-700 border border-blue-200 shadow-inner ${gameState === 'REPRODUCTION' && reproPhase === 'PICK_GAMETES' ? 'opacity-40 grayscale scale-95' : ''}`}>
                          {gameState === 'REPRODUCTION' && reproPhase === 'PICK_GAMETES' && (
                            <div className="absolute inset-0 flex items-center justify-center bg-white/70 z-10 font-black text-slate-800 rounded-xl text-base border-2 border-dashed border-slate-400">
                              🔒 不參與配子形成
                            </div>
                          )}
                          <div className="text-sm font-bold text-blue-600 mb-3 bg-blue-100 rounded-full py-1.5 border border-blue-200">體細胞 (決定表徵)</div>
                          <div className="text-4xl tracking-widest text-blue-900 flex justify-center gap-3">
                            {somatic.length > 0 ? somatic.map((a, i) => <AlleleUI key={i} allele={a} />) : '--'}
                          </div>
                        </div>
                        
                        <div className={`bg-green-50 border-2 border-green-400 rounded-2xl p-5 text-center transition-all duration-700 border border-green-300 shadow-inner ${gameState === 'REPRODUCTION' && reproPhase === 'PICK_GAMETES' ? 'ring-4 ring-green-300 ring-offset-2 scale-105 relative z-20 shadow-lg' : ''}`}>
                          <div className="text-sm font-bold text-green-700 mb-3 bg-green-200 rounded-full py-1.5 border border-green-200">生殖細胞 (用來遺傳)</div>
                          <div className="text-4xl tracking-widest text-green-900 flex justify-center gap-3">
                            {germ.length > 0 ? germ.map((a, i) => <AlleleUI key={i} allele={a} />) : '--'}
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="p-6 md:p-8">
                      
                      {gameState === 'EVENT_DRAW' && (
                        <div className="h-full flex flex-col justify-center items-center py-10 animate-fade-in">
                          <h3 className="text-xl font-bold text-slate-700 mb-8 w-full text-center">階段 1：環境事件</h3>
                          {!isPhenotypeConfirmed ? (
                             <div className="w-full py-8 bg-slate-200 text-slate-500 font-bold rounded-2xl shadow-inner text-xl text-center border-2 border-dashed border-slate-300">
                               👈 請先完成左側的「表徵判定」
                             </div>
                          ) : (
                            <button onClick={drawCard} className="w-full py-8 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 active:scale-95 text-white font-black rounded-2xl shadow-xl text-2xl transition-all border border-indigo-700">
                              點擊抽取「事件卡」
                            </button>
                          )}
                        </div>
                      )}

                      {gameState === 'EVENT_APPLY' && currentCard && (
                        <div className="w-full text-center animate-fade-in py-4">
                          <h3 className="text-xl font-bold text-slate-700 mb-6">階段 1：環境事件分析</h3>
                          
                          <div className={`p-6 rounded-2xl shadow-md border-l-8 text-left mb-8 border border-slate-200 ${currentCard.type === 'env' ? 'bg-red-50 border-red-500' : 'bg-slate-50 border-slate-400'}`}>
                            <div className="text-base font-bold text-slate-500 mb-2">{currentCard.type === 'env' ? '⚠️ 環境刺激' : '⏳ 自然歲月'}</div>
                            <div className="text-xl md:text-2xl font-bold text-slate-800 mb-3">{currentCard.name}</div>
                            <div className="text-slate-600 text-base md:text-lg whitespace-pre-wrap">{currentCard.desc}</div>
                          </div>

                          <div className="bg-indigo-50 p-6 rounded-3xl border border-indigo-200 text-center shadow-inner mb-8 border border-indigo-100">
                              <p className="font-bold text-indigo-800 mb-4 text-lg">🛠️ 請手動更新你的基因：<br/><span className="text-sm font-normal text-indigo-600">根據事件卡指示，點擊下方按鈕切換突變狀態 (沒有突變就不需點擊)</span></p>
                              
                              <div className="grid grid-cols-2 gap-4 md:gap-6">
                                  <div className="bg-white p-4 rounded-xl shadow-sm border border-blue-200 active:border-blue-400 active:bg-blue-50 transition-colors border border-blue-100">
                                      <div className="text-sm text-blue-600 font-bold mb-3">修改體細胞基因</div>
                                      <div className="flex justify-center gap-3">
                                          {pendingSomatic.map((a, i) => (
                                              <button key={`s-${i}`} onClick={() => handleToggleMutation('somatic', i)} className="w-16 h-16 md:w-20 md:h-20 flex items-center justify-center border-2 border-slate-200 active:bg-slate-100 rounded-xl text-4xl font-black transition-all active:scale-90 active:border-slate-400 border border-slate-200 shadow-sm">
                                                  <AlleleUI allele={a} />
                                              </button>
                                          ))}
                                      </div>
                                  </div>
                                  <div className="bg-white p-4 rounded-xl shadow-sm border border-green-200 active:border-green-400 active:bg-green-50 transition-colors border border-green-100">
                                      <div className="text-sm text-green-700 font-bold mb-3">修改生殖細胞基因</div>
                                      <div className="flex justify-center gap-3">
                                          {pendingGerm.map((a, i) => (
                                              <button key={`g-${i}`} onClick={() => handleToggleMutation('germ', i)} className="w-16 h-16 md:w-20 md:h-20 flex items-center justify-center border-2 border-slate-200 active:bg-slate-100 rounded-xl text-4xl font-black transition-all active:scale-90 active:border-slate-400 border border-slate-200 shadow-sm">
                                                  <AlleleUI allele={a} />
                                              </button>
                                          ))}
                                      </div>
                                  </div>
                              </div>
                              {mutationCheckMsg && <div className="mt-5 text-red-600 font-bold text-base bg-red-100 py-3 px-4 rounded-xl animate-pulse border border-red-200">{mutationCheckMsg}</div>}
                          </div>

                          <button onClick={checkMutation} className="w-full py-4 bg-teal-600 hover:bg-teal-500 active:bg-teal-700 active:scale-95 text-white font-black rounded-2xl shadow-lg text-xl transition-all border border-teal-700">
                            檢查並確認突變
                          </button>
                        </div>
                      )}

                      {gameState === 'REPRODUCTION' && reproPhase === 'CHOOSE_CELL' && (
                        <div className="h-full flex flex-col justify-center animate-fade-in text-center py-6">
                          <h3 className="text-2xl font-black text-slate-800 mb-8">階段 2：準備減數分裂</h3>
                          
                          {!isPhenotypeConfirmed ? (
                             <div className="w-full py-8 bg-slate-200 text-slate-600 font-bold rounded-2xl shadow-inner text-xl text-center border-2 border-dashed border-slate-400">
                               👈 經歷突變事件後，請再次判定左側的表徵狀態！<br/><span className="text-base text-slate-500 mt-2 block">(即使突變在生殖細胞，也要確認自己的體細胞喔)</span>
                             </div>
                          ) : (
                            <>
                              <p className="text-slate-600 mb-8 font-bold text-lg">請選擇你要用哪一種細胞來進行減數分裂，產生傳遞給下一代的配子？</p>
                              
                              <div className="flex flex-col gap-5">
                                <button onClick={() => handleChooseCellForMeiosis('somatic')} className="py-5 bg-white border-2 border-blue-400 hover:bg-blue-50 active:bg-blue-100 active:scale-95 Text-blue-800 font-black rounded-2xl shadow-md transition-all text-lg border border-blue-200 active:border-blue-600">
                                  🧬 選擇【體細胞】進行減數分裂
                                </button>
                                <button onClick={() => handleChooseCellForMeiosis('germ')} className="py-5 bg-white border-2 border-green-500 hover:bg-green-50 active:bg-green-100 active:scale-95 Text-green-800 font-black rounded-2xl shadow-md transition-all text-lg border border-green-300 active:border-green-600">
                                  🌱 選擇【生殖細胞】進行減數分裂
                                </button>
                              </div>
                              
                              {cellChoiceError && (
                                <div className="mt-6 p-4 bg-red-100 text-red-700 font-bold rounded-xl animate-bounce text-lg border border-red-200">{cellChoiceError}</div>
                              )}
                            </>
                          )}
                        </div>
                      )}

                      {gameState === 'REPRODUCTION' && reproPhase === 'PICK_GAMETES' && (
                        <div className="h-full flex flex-col justify-center animate-fade-in py-4">
                          <h3 className="text-lg font-bold text-slate-700 mb-4 text-center whitespace-nowrap overflow-x-auto hide-scrollbar">階段 2：生殖細胞減數分裂</h3>
                          
                          <div className="flex flex-col items-center mb-6 text-center">
                              <div className="text-sm text-green-700 font-bold bg-green-100 px-4 py-1.5 rounded-full mb-2 border border-green-300 shadow-sm">由生殖細胞進行減數分裂</div>
                              <div className="text-slate-400 text-2xl font-black mb-2 animate-pulse">⬇</div>
                              <p className="text-base font-bold text-slate-600">產生了 4 顆配子，請進行盲選！</p>
                          </div>

                          <div className="bg-slate-100 p-6 rounded-3xl text-center mb-8 border border-slate-200 shadow-inner">
                            <div className="flex justify-center gap-4 md:gap-6 mb-6">
                               {hiddenGametes.map((g, idx) => {
                                   let isKeep = selectedKeepIndex === idx;
                                   let isPass = selectedPassIndex === idx;
                                   let isSelected = isKeep || isPass;
                                   let borderClass = isKeep ? 'border-teal-500 bg-teal-50 scale-105 shadow-md' : (isPass ? 'border-indigo-500 bg-indigo-50 scale-105 shadow-md' : 'border-slate-300 hover:border-slate-400 hover:bg-slate-50 active:border-slate-500 active:scale-95 active:bg-slate-100 bg-white cursor-pointer hover:-translate-y-1');
                                   let content = isSelected ? <AlleleUI allele={g} /> : <span className="text-slate-300 font-black text-4xl">?</span>;

                                   return (
                                       <div key={idx} onClick={() => handlePickGamete(idx)} className={`w-18 h-28 md:w-24 md:h-32 flex flex-col justify-center items-center rounded-xl border-2 shadow-sm transition-all duration-300 border border-slate-200 active:border-slate-400 ${borderClass}`}>
                                           <div className="text-4xl">{content}</div>
                                           {isKeep && <div className="text-[11px] text-teal-700 font-bold mt-2 bg-teal-100 px-2 py-0.5 rounded border border-teal-200">自己保留</div>}
                                           {isPass && <div className="text-[11px] text-indigo-700 font-bold mt-2 bg-indigo-100 px-2 py-0.5 rounded border border-indigo-200">傳給右邊</div>}
                                       </div>
                                   );
                               })}
                            </div>
                            
                            {selectedKeepIndex === null && <p className="font-bold text-teal-600 animate-pulse text-lg bg-teal-50 py-2 rounded-lg border border-teal-100">👉 第 1 抽：選擇 1 顆「保留給自己」</p>}
                            {selectedKeepIndex !== null && selectedPassIndex === null && <p className="font-bold text-indigo-600 animate-pulse text-lg bg-indigo-50 py-2 rounded-lg border border-indigo-100">👉 第 2 抽：選擇 1 顆「傳給右邊同學」</p>}
                            {selectedKeepIndex !== null && selectedPassIndex !== null && <p className="font-bold text-green-600 text-lg bg-green-50 py-2 rounded-lg border border-green-100">✅ 你的配子處理完成！</p>}
                          </div>

                          {selectedKeepIndex !== null && selectedPassIndex !== null && (
                            <div className="bg-indigo-50 p-6 rounded-3xl border border-indigo-100 text-center shadow-inner animate-fade-in border border-indigo-100 shadow-md">
                              <p className="font-bold text-slate-700 mb-4 text-base md:text-lg">請問「左邊」同學傳給你的配子是什麼？</p>
                              <div className="grid grid-cols-4 gap-3 md:gap-4 mb-5">
                                {['A', 'a', 'A_mut', 'a_mut'].map(al => (
                                  <button 
                                    key={al} 
                                    onClick={() => setPendingReceivedGamete(al)} 
                                    className={`bg-white border-2 py-3 rounded-xl text-3xl font-black shadow-sm transition-all border border-slate-200 ${pendingReceivedGamete === al ? 'border-indigo-500 bg-indigo-50 scale-105 ring-4 ring-indigo-200 active:border-indigo-700' : 'hover:border-indigo-300 hover:bg-slate-50 active:border-indigo-400 active:scale-95 active:bg-indigo-100'}`}
                                  >
                                    <AlleleUI allele={al} />
                                  </button>
                                ))}
                              </div>
                              
                              {pendingReceivedGamete && (
                                <button onClick={receiveGamete} className="mt-2 px-8 py-4 bg-teal-600 hover:bg-teal-500 active:bg-teal-700 active:scale-95 text-white font-black rounded-xl shadow-lg transition-transform w-full text-xl border border-teal-700">
                                  確認並進入下一代 🧬
                                </button>
                              )}
                            </div>
                          )}
                        </div>
                      )}

                    </div>
                  </div>
                )}

                {gameState === 'END' && (
                  <div className="h-full flex flex-col justify-center items-center text-center animate-fade-in py-12 px-6 hide-scrollbar overflow-y-auto max-h-[85vh]">
                    <div className="text-8xl mb-6 animate-pulse active:scale-110 transition-transform">🎉</div>
                    <h2 className="text-4xl font-black text-slate-800 mb-4 animate-fade-in">遊戲結束！</h2>
                    <p className="text-lg text-slate-600 mb-8 font-bold">經過 6 代的繁衍與突變，你的最終型態是：</p>
                    
                    <div className={`p-8 rounded-3xl shadow-md w-full max-w-md mb-8 relative border-2 transition-all ${pt.bgColor} ${pt.textColor} border-slate-300 shadow-inner active:scale-105 transition-transform`}>
                      <div className="text-3xl font-black mb-2">{pt.name}</div>
                      <div className="text-4xl tracking-widest mt-3 flex justify-center gap-3">
                         {somatic.map((a, i) => <AlleleUI key={i} allele={a} />)}
                      </div>
                    </div>

                    <div className="bg-slate-100 p-8 rounded-3xl w-full border border-slate-200 shadow-inner mb-8 text-left max-w-md">
                        <h3 className="font-black text-slate-700 mb-6 border-b-2 border-slate-300 pb-3 text-center text-2xl">結算成績</h3>
                        <div className="flex justify-between items-center mb-3 text-xl hover:bg-slate-200 px-2 py-1 rounded-lg transition-colors">
                            <span className="text-slate-600 font-bold">生存總分</span>
                            <span className="font-black text-teal-600">{score} 分</span>
                        </div>
                        <div className="flex justify-between items-center mb-6 text-xl hover:bg-slate-200 px-2 py-1 rounded-lg transition-colors">
                            <span className="text-slate-600 font-bold">操作錯誤扣分 ({errorCount} 次)</span>
                            <span className="font-black text-red-500">- {errorCount * 5} 分</span>
                        </div>
                        <div className="flex justify-between items-center border-t-4 border-slate-300 pt-5 text-2xl bg-slate-200 px-2 py-3 rounded-xl border border-slate-300 shadow-inner">
                            <span className="font-black text-slate-800">最終得分</span>
                            <span className="font-black text-indigo-700 text-5xl active:scale-110 transition-transform">{score - (errorCount * 5)} 分</span>
                        </div>
                    </div>
                    
                    <button onClick={startGame} className="px-12 py-5 bg-slate-800 hover:bg-slate-700 active:bg-black active:scale-95 Text-white font-black rounded-full shadow-2xl transition-all text-xl border border-slate-700 active:border-black w-full md:w-auto">
                      重新開始新的家族繁衍
                    </button>
                  </div>
                )}

                {history.length > 0 && gameState !== 'SETUP' && (
                  <div className="p-6 md:p-8 bg-slate-100 border-t border-slate-200 animate-fade-in">
                    <h3 className="text-xl font-black text-slate-700 mb-4 flex items-center whitespace-nowrap overflow-x-auto hide-scrollbar">📜 你的突變與遺傳紀錄 <span className="text-sm text-indigo-600 ml-3 font-bold animate-pulse whitespace-nowrap">(👉 表格可向左右滑動)</span></h3>
                    <div className="overflow-x-auto hide-scrollbar rounded-xl border border-slate-300 shadow-sm border border-slate-200">
                      <table className="w-full text-sm md:text-base text-left whitespace-nowrap bg-white border-collapse">
                        <thead className="bg-slate-200 text-slate-700 uppercase text-xs md:text-sm border-b border-slate-300">
                          <tr>
                            <th className="px-5 py-3 font-black text-center border-r border-slate-300">回合</th>
                            <th className="px-5 py-3 font-black border-r border-slate-300">初始細胞 (體/生)</th>
                            <th className="px-5 py-3 font-black border-r border-slate-300">當代表徵</th>
                            <th className="px-5 py-3 font-black border-r border-slate-300">遭遇事件 & 突變</th>
                            <th className="px-5 py-3 bg-yellow-200 text-yellow-900 font-black border-r border-slate-300">突變後細胞 (體/生)</th>
                            <th className="px-5 py-3 font-black border-r border-slate-300">減數分裂與傳遞</th>
                            <th className="px-5 py-3 font-black rounded-tr-xl">下一代基因 & 表徵</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-200 border-b border-slate-200">
                          {history.map((h, i) => {
                            const formatAllele = (a) => (a && a.includes('mut') ? '*' : '') + (a ? a[0] : '?');
                            return (
                            <tr key={i} className="hover:bg-slate-50 transition-colors">
                              <td className="px-5 py-4 font-black text-slate-800 text-center text-lg border-r border-slate-200">{h.round}</td>
                              <td className="px-5 py-4 font-mono text-base border-r border-slate-200">
                                 <span className="text-blue-600 mr-2">[{h.somaticBefore.map(formatAllele).join('')}]</span> 
                                 <span className="text-green-600">[{h.germBefore.map(formatAllele).join('')}]</span>
                              </td>
                              <td className="px-5 py-4 font-bold text-slate-800 border-r border-slate-200">{h.phenotypeBefore}</td>
                              <td className="px-5 py-4 text-sm text-slate-600 whitespace-pre-wrap leading-relaxed border-r border-slate-200 min-w-[250px]">{h.eventDetail}</td>
                              <td className="px-5 py-4 font-mono text-base bg-yellow-50 border-r border-slate-200">
                                 <span className="text-blue-700 font-bold mr-2">[{h.somaticAfter.map(formatAllele).join('')}]</span> 
                                 <span className="text-green-700 font-bold">[{h.germAfter.map(formatAllele).join('')}]</span>
                              </td>
                              <td className="px-5 py-4 border-r border-slate-200">
                                <div className="text-xs text-green-700 font-bold mb-1">來源: {h.meiosisSource}</div>
                                <div className="font-mono text-base font-bold text-slate-700">傳: {formatAllele(h.passed)} / 收: {formatAllele(h.received)}</div>
                              </td>
                              <td className="px-5 py-4">
                                <div className="font-mono font-black text-indigo-700 text-lg">[{h.nextGenotype.map(formatAllele).join('')}]</div>
                                <div className="text-sm font-bold text-slate-600 mt-1">{h.nextPhenotype}</div>
                              </td>
                            </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                    <div className="text-sm text-slate-500 mt-3 font-bold text-right">* 註：紀錄表中帶星號 (*) 者代表突變基因。</div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
